<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lisää resepti – Reseptikirja</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="container topbar-inner">
    <span class="logo">Reseptikirja</span>
  </div>
</header>

<main class="container">
  <a href="index.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Takaisin
  </a>

  <h1 id="page-title" class="page-title">Lisää resepti</h1>

  <!-- ── Kuvakaappaus ── -->
  <div class="form-card">
    <h3>Analysoi kuvakaappaus</h3>

    <div class="api-key-section">
      <button class="api-key-toggle" id="api-key-toggle">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
        Anthropic API-avain
      </button>
      <div class="api-key-form" id="api-key-form">
        <div class="field" style="margin-top:8px">
          <input type="password" id="api-key-input" placeholder="sk-ant-…" autocomplete="off">
        </div>
        <p style="font-size:12px;color:var(--muted);margin-top:4px">Avain tallennetaan selaimen paikalliseen tallennustilaan.</p>
      </div>
    </div>

    <div class="upload-area" id="upload-area">
      <input type="file" id="file-input" accept="image/*">
      <div id="upload-hint">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
        <p><strong>Lataa kuvakaappaus</strong><br>tai vedä ja pudota tähän</p>
      </div>
      <img id="upload-preview" class="upload-preview" alt="Esikatselu">
    </div>

    <div style="margin-top:12px">
      <button id="btn-analyze" class="btn btn-primary" disabled>Analysoi kuva</button>
      <span style="font-size:13px;color:var(--muted);margin-left:10px">Täyttää lomakkeen automaattisesti</span>
    </div>
  </div>

  <!-- ── Perustiedot ── -->
  <div class="form-card">
    <h3>Perustiedot</h3>
    <div class="field">
      <label for="title">Reseptin nimi *</label>
      <input type="text" id="title" placeholder="esim. Kanapasta">
    </div>
    <div class="row">
      <div class="field">
        <label for="servings">Annoksia</label>
        <input type="number" id="servings" min="1" placeholder="4">
      </div>
      <div class="field">
        <label for="servings-unit">Yksikkö</label>
        <input type="text" id="servings-unit" placeholder="annosta" value="annosta">
      </div>
    </div>
    <div class="field">
      <label>Tagit</label>
      <div class="tags-input-wrap" id="tags-wrap">
        <input type="text" id="tags-input" placeholder="esim. pasta, kana – Enter lisää">
      </div>
    </div>
  </div>

  <!-- ── Ainekset ── -->
  <div class="form-card">
    <h3>Ainekset</h3>
    <div id="ing-sections"></div>
    <button id="add-section-btn" class="add-btn" style="margin-top:8px">+ Lisää osio (esim. Kastike, Lisäksi)</button>
  </div>

  <!-- ── Ohje ── -->
  <div class="form-card">
    <h3>Valmistusohje</h3>
    <div id="steps"></div>
    <button id="add-step-btn" class="add-btn" style="margin-top:4px">+ Lisää vaihe</button>
  </div>

  <!-- ── Vinkit ── -->
  <div class="form-card">
    <h3>Vinkit / huomiot</h3>
    <div class="field">
      <textarea id="notes" placeholder="Vapaaehtoinen teksti – näkyy reseptin lopussa vinkkiboksissa"></textarea>
    </div>
  </div>

  <div class="form-footer">
    <button id="btn-cancel" class="btn btn-ghost">Peruuta</button>
    <button id="btn-save" class="btn btn-primary">Tallenna resepti</button>
  </div>
</main>

<div id="toast" class="toast"></div>

<script src="js/db.js"></script>
<script src="js/lisaa.js"></script>
</body>
</html>
