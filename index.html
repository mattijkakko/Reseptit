<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reseptikirja</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="container topbar-inner">
    <span class="logo">Reseptikirja</span>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="search" placeholder="Hae reseptejä tai ainesosia…" autocomplete="off">
    </div>
    <a href="lisaa.html" class="btn btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Lisää
    </a>
    <button id="btn-logout" class="btn-logout">Kirjaudu ulos</button>
  </div>
</header>

<main class="container">
  <div class="section-header">
    <h1>Kaikki reseptit</h1>
    <span id="recipe-count" class="count"></span>
  </div>

  <div id="recipe-grid" class="grid"></div>

  <div id="empty-state" class="empty" hidden>
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
    <h2>Ei vielä reseptejä</h2>
    <p>Lisää ensimmäinen resepti kuvakaappauksesta tai syöttämällä tiedot käsin.</p>
    <a href="lisaa.html" class="btn btn-primary">Lisää resepti</a>
  </div>
</main>

<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/index.js"></script>
</body>
</html>
