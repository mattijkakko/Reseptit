<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resepti – Reseptikirja</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="container topbar-inner">
    <span class="logo">Reseptikirja</span>
    <button id="btn-logout" class="btn-logout" style="margin-left:auto">Kirjaudu ulos</button>
  </div>
</header>

<main class="container">
  <a href="index.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Kaikki reseptit
  </a>

  <div class="recipe-header">
    <h1 id="recipe-title" class="recipe-title"></h1>
    <div class="recipe-meta">
      <div id="servings-control" class="servings-control" hidden>
        <button id="btn-servings-minus" class="servings-btn" aria-label="Vähennä annoksia">−</button>
        <span id="servings-value"></span>
        <span id="servings-unit"></span>
        <button id="btn-servings-plus" class="servings-btn" aria-label="Lisää annoksia">+</button>
      </div>
      <span id="recipe-date" style="font-size:13px;color:var(--muted)"></span>
      <div class="recipe-actions" style="margin-left:auto">
        <button id="btn-edit" class="btn btn-ghost btn-sm">Muokkaa</button>
        <button id="btn-delete" class="btn btn-danger btn-sm">Poista</button>
      </div>
    </div>
    <div id="recipe-tags" class="tags" style="margin-top:10px"></div>
  </div>

  <div class="recipe-body">
    <aside class="ingredients-col">
      <h2>Ainekset</h2>
      <div id="ingredients"></div>
    </aside>

    <section class="instructions-col">
      <h2>Ohje</h2>
      <ol class="instructions-list"></ol>

      <div id="notes-section" hidden>
        <div class="notes-box">
          <strong>Vinkit</strong>
          <span id="notes-text"></span>
        </div>
      </div>
    </section>
  </div>
</main>

<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/resepti.js"></script>
</body>
</html>
